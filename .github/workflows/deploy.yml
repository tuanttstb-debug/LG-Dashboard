name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build static export
        env:
          NEXT_PUBLIC_APP_NAME: LG Dashboard
          NEXT_PUBLIC_APP_URL: https://tuanttstb-debug.github.io/LG-Dashboard
          NEXT_PUBLIC_GEMINI_API_KEY: ${{ secrets.NEXT_PUBLIC_GEMINI_API_KEY }}
          NEXT_PUBLIC_GEMINI_MODEL: gemini-2.5-flash
          NEXT_PUBLIC_GEMINI_FLASH_MODEL: gemini-2.5-flash
          NEXT_PUBLIC_OCR_ENGINE: gemini
          NEXT_PUBLIC_OCR_MAX_RETRIES: "3"
          NEXT_PUBLIC_OCR_TIMEOUT_MS: "60000"
          NEXT_PUBLIC_GAS_WEB_APP_URL: ${{ secrets.NEXT_PUBLIC_GAS_WEB_APP_URL }}
          NEXT_PUBLIC_GAS_API_SECRET: ${{ secrets.NEXT_PUBLIC_GAS_API_SECRET }}
          NEXT_PUBLIC_GOOGLE_DRIVE_PDF_FOLDER_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_DRIVE_PDF_FOLDER_ID }}
          NEXT_PUBLIC_GOOGLE_DRIVE_EXCEL_FOLDER_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_DRIVE_EXCEL_FOLDER_ID }}
          NEXT_PUBLIC_GOOGLE_DRIVE_DETAIL_FOLDER_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_DRIVE_DETAIL_FOLDER_ID }}
          NEXT_PUBLIC_GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_SHEETS_SPREADSHEET_ID }}
          NEXT_PUBLIC_GOOGLE_SHEETS_INVOICE_SHEET: INVOICES
          NEXT_PUBLIC_GOOGLE_SHEETS_VERSION_SHEET: VERSIONS
          NEXT_PUBLIC_GOOGLE_SHEETS_METADATA_SHEET: METADATA
          NEXT_PUBLIC_DEFAULT_COURIER: fedex
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
